name: Risky PR prompt

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  agent-review:
    runs-on: ubuntu-latest
    steps:
      - name: Build prompt from untrusted PR text
        env:
          REVIEW_PROMPT: |
            Review this pull request title and body:
            ${{ github.event.pull_request.title }}
            ${{ github.event.pull_request.body }}
        run: |
          ./agent-review --prompt "$REVIEW_PROMPT"
